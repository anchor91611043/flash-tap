<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flash Tap</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* モード表示用のラベル */
        #mode-label {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 20px;
            color: #555;
            font-family: sans-serif;
            font-size: 12px;
            letter-spacing: 0.1em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-family: -apple-system, system-ui, sans-serif;
            font-size: 14px;
            letter-spacing: 0.2em;
            pointer-events: none;
            transition: opacity 1.5s;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="mode-label">MODE: RIPPLE</div>
    <div id="hint">SCREEN TAP TO LIGHT<br><span style="font-size: 10px; letter-spacing: 0;">(Flick to change mode)</span></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        const modeLabel = document.getElementById('mode-label');
        
        let width, height;
        let elements = [];
        let hasStarted = false;
        let currentMode = 0;

        // フリック判定用の変数
        let touchStartX = 0;
        let touchStartY = 0;
        const FLICK_THRESHOLD = 50; // フリックとみなす最小移動距離

        const modes = ['RIPPLE', 'SQUARE'];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resize);
        resize();

        class Ripple {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 0;
                this.opacity = 1.0;
                this.hue = Math.floor(Math.random() * 360);
                this.velocity = Math.max(width, height) * 0.03;
            }
            update() {
                this.radius += this.velocity;
                this.opacity -= 0.02;
                this.velocity *= 0.96;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.lineWidth = 5;
                ctx.stroke();
            }
        }

        class Square {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = 0;
                this.opacity = 1.0;
                this.hue = Math.floor(Math.random() * 360);
                this.rotation = Math.random() * Math.PI;
                this.velocity = Math.max(width, height) * 0.04;
            }
            update() {
                this.size += this.velocity;
                this.opacity -= 0.03;
                this.velocity *= 0.95;
                this.rotation += 0.02;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.strokeStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.lineWidth = 4;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            for (let i = elements.length - 1; i >= 0; i--) {
                elements[i].update();
                elements[i].draw();
                if (elements[i].opacity <= 0) elements.splice(i, 1);
            }
            requestAnimationFrame(draw);
        }

        function showModeLabel() {
            modeLabel.innerText = `MODE: ${modes[currentMode]}`;
            modeLabel.style.opacity = '1';
            setTimeout(() => { modeLabel.style.opacity = '0'; }, 1500);
        }

        // 開始時
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });

        // 終了時（ここでタップかフリックかを判定）
        window.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            if (distance > FLICK_THRESHOLD) {
                // フリック：モード切り替え
                currentMode = (currentMode + 1) % modes.length;
                showModeLabel();
                elements = []; // 前のエフェクトをクリア
            } else {
                // タップ：エフェクト発生
                if (!hasStarted) {
                    hint.style.opacity = '0';
                    hasStarted = true;
                }

                // 指を離した位置にエフェクトを出す（touchstartの位置でもOK）
                const x = touch.clientX;
                const y = touch.clientY;

                if (modes[currentMode] === 'RIPPLE') {
                    elements.push(new Ripple(x, y));
                } else if (modes[currentMode] === 'SQUARE') {
                    elements.push(new Square(x, y));
                }

                ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.fillRect(0, 0, width, height);
            }
        }, { passive: false });

        // PCでの動作確認用
        window.addEventListener('mousedown', (e) => {
            if ('ontouchstart' in window) return;
            if (!hasStarted) { hint.style.opacity = '0'; hasStarted = true; }
            const x = e.clientX;
            const y = e.clientY;
            if (modes[currentMode] === 'RIPPLE') elements.push(new Ripple(x, y));
            else if (modes[currentMode] === 'SQUARE') elements.push(new Square(x, y));
            ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.fillRect(0, 0, width, height);
        });

        draw();
    </script>
</body>
</html>
