<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flash Tap</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #mode-label {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 20px;
            color: #888;
            font-family: sans-serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: bold;
        }

        #hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-family: -apple-system, system-ui, sans-serif;
            font-size: 14px;
            letter-spacing: 0.2em;
            pointer-events: none;
            transition: opacity 1.5s;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <!-- 初期モードをSTARに変更 -->
    <div id="mode-label">MODE: STAR</div>
    <div id="hint">SCREEN TAP TO LIGHT<br><span style="font-size: 10px; letter-spacing: 0;">(Flick to change mode)</span></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        const modeLabel = document.getElementById('mode-label');
        
        let width, height;
        let elements = [];
        let hasStarted = false;
        let currentMode = 0; // 初期モード (STAR)

        let touchStartX = 0;
        let touchStartY = 0;
        const FLICK_THRESHOLD = 50;
        let labelTimeout = null;

        // 新しいモード STAR を先頭に追加
        const modes = ['STAR', 'RIPPLE', 'SQUARE', 'PARTICLE', 'GRAVITY'];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resize);
        resize();

        // --- 0. STAR (四芒星: 波紋の線なし発光バージョン) ---
        class Star {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 0;
                this.opacity = 1.0;
                this.hue = Math.floor(Math.random() * 360);
                this.velocity = Math.max(width, height) * 0.035;
            }
            update() {
                this.radius += this.velocity;
                this.opacity -= 0.025; // 波紋より少し早く消える
                this.velocity *= 0.95;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 四芒星 (Four Pointed Star) のパスを描画
                ctx.beginPath();
                ctx.moveTo(this.radius, 0);
                ctx.quadraticCurveTo(0, 0, 0, this.radius);
                ctx.quadraticCurveTo(0, 0, -this.radius, 0);
                ctx.quadraticCurveTo(0, 0, 0, -this.radius);
                ctx.quadraticCurveTo(0, 0, this.radius, 0);
                ctx.closePath();
                
                // 外枠（ストローク）は描かず、中身（フィル）だけを発光させる
                ctx.fillStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.fill();

                // 中心部の強い光を重ねる
                ctx.beginPath();
                ctx.moveTo(this.radius * 0.4, 0);
                ctx.quadraticCurveTo(0, 0, 0, this.radius * 0.4);
                ctx.quadraticCurveTo(0, 0, -this.radius * 0.4, 0);
                ctx.quadraticCurveTo(0, 0, 0, -this.radius * 0.4);
                ctx.quadraticCurveTo(0, 0, this.radius * 0.4, 0);
                ctx.closePath();
                ctx.fillStyle = `hsla(${this.hue}, 90%, 85%, ${this.opacity * 0.5})`;
                ctx.fill();

                ctx.restore();
            }
        }

        // --- 1. RIPPLE (従来の波紋) ---
        class Ripple {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 0;
                this.opacity = 1.0;
                this.hue = Math.floor(Math.random() * 360);
                this.velocity = Math.max(width, height) * 0.03;
            }
            update() {
                this.radius += this.velocity;
                this.opacity -= 0.02;
                this.velocity *= 0.96;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.lineWidth = 5;
                ctx.stroke();
            }
        }

        // --- 2. SQUARE (回転四角形) ---
        class Square {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = 0;
                this.opacity = 1.0;
                this.hue = Math.floor(Math.random() * 360);
                this.rotation = Math.random() * Math.PI;
                this.velocity = Math.max(width, height) * 0.04;
            }
            update() {
                this.size += this.velocity;
                this.opacity -= 0.03;
                this.velocity *= 0.95;
                this.rotation += 0.05;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.strokeStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.lineWidth = 4;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        // --- 3. PARTICLE (火花) ---
        class Particle {
            constructor(x, y, hue) {
                this.x = x; this.y = y;
                this.hue = hue || Math.floor(Math.random() * 360);
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 8 + 2;
                this.friction = 0.95;
                this.size = Math.random() * 4 + 2;
                this.opacity = 1.0;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.speed *= this.friction;
                this.opacity -= 0.02;
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- 4. GRAVITY (重力粒子) ---
        class GravityDot {
            constructor(x, y, hue) {
                this.x = x; this.y = y;
                this.hue = hue;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.8) * 15;
                this.gravity = 0.5;
                this.opacity = 1.0;
                this.size = Math.random() * 5 + 3;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.opacity -= 0.015;
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 描画ループ
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            for (let i = elements.length - 1; i >= 0; i--) {
                elements[i].update();
                elements[i].draw();
                // 完全に透明になったら配列から削除
                if (elements[i].opacity <= 0) elements.splice(i, 1);
            }
            requestAnimationFrame(draw);
        }

        // ラベル表示（連続フリック時のバグ解消）
        function showModeLabel() {
            modeLabel.innerText = `MODE: ${modes[currentMode]}`;
            modeLabel.style.opacity = '1';
            
            if (labelTimeout) clearTimeout(labelTimeout);
            labelTimeout = setTimeout(() => {
                modeLabel.style.opacity = '0';
            }, 1500);
        }

        // タップ処理の振り分け
        function handleTrigger(x, y) {
            if (!hasStarted) {
                hint.style.opacity = '0';
                hasStarted = true;
            }

            const mode = modes[currentMode];
            const hue = Math.floor(Math.random() * 360); // 共通の色生成

            if (mode === 'STAR') {
                elements.push(new Star(x, y));
            } else if (mode === 'RIPPLE') {
                elements.push(new Ripple(x, y));
            } else if (mode === 'SQUARE') {
                elements.push(new Square(x, y));
            } else if (mode === 'PARTICLE') {
                for (let i = 0; i < 15; i++) elements.push(new Particle(x, y, hue));
            } else if (mode === 'GRAVITY') {
                for (let i = 0; i < 8; i++) elements.push(new GravityDot(x, y, hue));
            }

            // マイルドなフラッシュ効果
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fillRect(0, 0, width, height);
        }

        // イベントリスナー
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            if (distance > FLICK_THRESHOLD) {
                // フリック判定
                currentMode = (currentMode + 1) % modes.length;
                showModeLabel();
                elements = []; // 画面クリア
            } else {
                // タップ判定
                handleTrigger(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        // PC動作確認用
        window.addEventListener('mousedown', (e) => {
            if ('ontouchstart' in window) return;
            handleTrigger(e.clientX, e.clientY);
        });

        // アニメーション開始
        draw();
    </script>
</body>
</html>
