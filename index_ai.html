<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flash Tap + Gemini AI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #mode-label {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 20px;
            color: #888;
            font-family: sans-serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: bold;
            z-index: 10;
        }

        #hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-family: -apple-system, system-ui, sans-serif;
            font-size: 14px;
            letter-spacing: 0.2em;
            pointer-events: none;
            transition: opacity 1.5s;
            text-align: center;
            z-index: 5;
        }

        /* AI UI Elements */
        #ai-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .ai-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-family: sans-serif;
            font-size: 12px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        #ai-input-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #ai-input-modal input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #555;
            color: white;
            font-size: 24px;
            text-align: center;
            width: 80%;
            margin-bottom: 20px;
            outline: none;
        }

        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 150;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="mode-label">MODE: STAR</div>
    <div id="hint">SCREEN TAP TO LIGHT<br><span style="font-size: 10px; letter-spacing: 0;">(Flick to change mode)</span></div>

    <!-- AI Controls -->
    <div id="ai-controls">
        <button class="ai-btn" onclick="openAiPrompt()">✨ Mood Sync</button>
    </div>

    <!-- AI Input Modal -->
    <div id="ai-input-modal">
        <input type="text" id="mood-input" placeholder="今の気分は？ (例: 激しいロック、静かな宇宙)" onkeypress="handleKeyPress(event)">
        <div style="display: flex; gap: 10px;">
            <button class="ai-btn" onclick="closeAiPrompt()">キャンセル</button>
            <button class="ai-btn" style="background: #4a90e2;" onclick="applyAiMood()">✨ 生成する</button>
        </div>
    </div>

    <div id="loading-overlay">AIが光を調整中...</div>

    <script>
        const apiKey = ""; // API key is provided by the environment at runtime
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        const modeLabel = document.getElementById('mode-label');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        let width, height;
        let elements = [];
        let hasStarted = false;
        let currentMode = 0;

        let touchStartX = 0;
        let touchStartY = 0;
        const FLICK_THRESHOLD = 50;
        let labelTimeout = null;

        // AI Custom Settings
        let aiConfig = {
            hueRange: [0, 360],
            velocityMultiplier: 1.0,
            friction: 0.95,
            flashIntensity: 0.15
        };

        const modes = ['STAR', 'RIPPLE', 'SQUARE', 'PARTICLE', 'GRAVITY'];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resize);
        resize();

        // --- AI API Interaction with Exponential Backoff ---
        async function fetchGeminiMood(prompt) {
            const systemPrompt = `You are a creative lighting designer. Based on the user's mood, output a JSON object to configure a visual effects app. 
            Properties: 
            - hueMin (0-360): Minimum color hue
            - hueMax (0-360): Maximum color hue
            - velocity (0.5-2.0): Speed multiplier
            - friction (0.90-0.99): How long the light stays (higher stays longer)
            - flash (0.05-0.5): Background flash intensity
            - message (string): A short, poetic description of this lighting mode in Japanese.`;

            const payload = {
                contents: [{ parts: [{ text: `My mood is: ${prompt}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    
                    const result = await response.json();
                    return JSON.parse(result.candidates[0].content.parts[0].text);
                } catch (error) {
                    if (i === 4) {
                        alert("AIとの通信に失敗しました。時間をおいて再度お試しください。");
                        return null;
                    }
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        async function speakAiMessage(text) {
            const payload = {
                contents: [{ parts: [{ text: `Say gently: ${text}` }] }],
                generationConfig: { 
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('TTS Error');
                    const result = await response.json();
                    const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                    playPCM(pcmData);
                    return;
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        function playPCM(base64Data) {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            const wavData = createWavHeader(bytes.buffer, 24000);
            const blob = new Blob([wavData], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.play();
        }

        function createWavHeader(buffer, sampleRate) {
            const length = buffer.byteLength;
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            view.setUint32(0, 0x52494646, false); // RIFF
            view.setUint32(4, 36 + length, true);
            view.setUint32(8, 0x57415645, false); // WAVE
            view.setUint32(12, 0x666d7420, false); // fmt 
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // data
            view.setUint32(40, length, true);
            const combined = new Uint8Array(44 + length);
            combined.set(new Uint8Array(header), 0);
            combined.set(new Uint8Array(buffer), 44);
            return combined;
        }

        // --- UI Handlers ---
        function openAiPrompt() {
            document.getElementById('ai-input-modal').style.display = 'flex';
            document.getElementById('mood-input').focus();
        }

        function closeAiPrompt() {
            document.getElementById('ai-input-modal').style.display = 'none';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') applyAiMood();
        }

        async function applyAiMood() {
            const prompt = document.getElementById('mood-input').value;
            if (!prompt) return;

            loadingOverlay.style.display = 'flex';
            closeAiPrompt();

            const config = await fetchGeminiMood(prompt);
            loadingOverlay.style.display = 'none';

            if (config) {
                aiConfig.hueRange = [config.hueMin, config.hueMax];
                aiConfig.velocityMultiplier = config.velocity;
                aiConfig.friction = config.friction;
                aiConfig.flashIntensity = config.flash;

                elements = [];
                showModeLabel(`✨ Mood: ${config.message}`);
                speakAiMessage(config.message);
            }
        }

        // --- Visual Classes ---
        function getRandomHue() {
            return Math.floor(Math.random() * (aiConfig.hueRange[1] - aiConfig.hueRange[0])) + aiConfig.hueRange[0];
        }

        class Star {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 0;
                this.opacity = 1.0;
                this.hue = getRandomHue();
                this.velocity = Math.max(width, height) * 0.035 * aiConfig.velocityMultiplier;
            }
            update() {
                this.radius += this.velocity;
                this.opacity -= (1.01 - aiConfig.friction) * 0.5;
                this.velocity *= aiConfig.friction;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.beginPath();
                ctx.moveTo(this.radius, 0);
                ctx.quadraticCurveTo(0, 0, 0, this.radius);
                ctx.quadraticCurveTo(0, 0, -this.radius, 0);
                ctx.quadraticCurveTo(0, 0, 0, -this.radius);
                ctx.quadraticCurveTo(0, 0, this.radius, 0);
                ctx.closePath();
                ctx.fillStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.fill();
                ctx.restore();
            }
        }

        class Ripple {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 0;
                this.opacity = 1.0;
                this.hue = getRandomHue();
                this.velocity = Math.max(width, height) * 0.03 * aiConfig.velocityMultiplier;
            }
            update() {
                this.radius += this.velocity;
                this.opacity -= (1.01 - aiConfig.friction) * 0.4;
                this.velocity *= aiConfig.friction;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.lineWidth = 5;
                ctx.stroke();
            }
        }

        class Square {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = 0;
                this.opacity = 1.0;
                this.hue = getRandomHue();
                this.rotation = Math.random() * Math.PI;
                this.velocity = Math.max(width, height) * 0.04 * aiConfig.velocityMultiplier;
            }
            update() {
                this.size += this.velocity;
                this.opacity -= (1.01 - aiConfig.friction) * 0.6;
                this.velocity *= aiConfig.friction;
                this.rotation += 0.05;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.strokeStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.lineWidth = 4;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x; this.y = y;
                this.hue = hue || getRandomHue();
                this.angle = Math.random() * Math.PI * 2;
                this.speed = (Math.random() * 8 + 2) * aiConfig.velocityMultiplier;
                this.friction = aiConfig.friction;
                this.size = Math.random() * 4 + 2;
                this.opacity = 1.0;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.speed *= this.friction;
                this.opacity -= 0.02;
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class GravityDot {
            constructor(x, y, hue) {
                this.x = x; this.y = y;
                this.hue = hue;
                this.vx = (Math.random() - 0.5) * 10 * aiConfig.velocityMultiplier;
                this.vy = (Math.random() - 0.8) * 15 * aiConfig.velocityMultiplier;
                this.gravity = 0.5;
                this.opacity = 1.0;
                this.size = Math.random() * 5 + 3;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.opacity -= 0.015;
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 90%, 65%, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            for (let i = elements.length - 1; i >= 0; i--) {
                elements[i].update();
                elements[i].draw();
                if (elements[i].opacity <= 0) elements.splice(i, 1);
            }
            requestAnimationFrame(draw);
        }

        function showModeLabel(text) {
            modeLabel.innerText = text || `MODE: ${modes[currentMode]}`;
            modeLabel.style.opacity = '1';
            
            if (labelTimeout) clearTimeout(labelTimeout);
            labelTimeout = setTimeout(() => {
                modeLabel.style.opacity = '0';
            }, 2500);
        }

        function handleTrigger(x, y) {
            if (!hasStarted) {
                hint.style.opacity = '0';
                hasStarted = true;
            }

            const mode = modes[currentMode];
            const hue = getRandomHue();

            if (mode === 'STAR') elements.push(new Star(x, y));
            else if (mode === 'RIPPLE') elements.push(new Ripple(x, y));
            else if (mode === 'SQUARE') elements.push(new Square(x, y));
            else if (mode === 'PARTICLE') for (let i = 0; i < 15; i++) elements.push(new Particle(x, y, hue));
            else if (mode === 'GRAVITY') for (let i = 0; i < 8; i++) elements.push(new GravityDot(x, y, hue));

            ctx.fillStyle = `rgba(255, 255, 255, ${aiConfig.flashIntensity})`;
            ctx.fillRect(0, 0, width, height);
        }

        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('.ai-btn') || e.target.closest('#ai-input-modal')) return;
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (e.target.closest('.ai-btn') || e.target.closest('#ai-input-modal')) return;
            e.preventDefault();
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            if (distance > FLICK_THRESHOLD) {
                currentMode = (currentMode + 1) % modes.length;
                showModeLabel();
                elements = [];
            } else {
                handleTrigger(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('.ai-btn') || e.target.closest('#ai-input-modal')) return;
            if ('ontouchstart' in window) return;
            handleTrigger(e.clientX, e.clientY);
        });

        window.onload = () => {
            draw();
        };
    </script>
</body>
</html>
